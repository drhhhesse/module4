[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: testes de unidade (caixa-branca)
    integration: testes de integracao (caixa-cinza)
    system: testes de sistema (caixa-preta / E2E)
    negative: casos de teste negativos (edge/error cases)
    boundary: casos derivados por analise de valor limite
addopts =
    -v
    --strict-markers
    --tb=short
